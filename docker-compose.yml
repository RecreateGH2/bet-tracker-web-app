services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: bet-tracker-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      # Persist SQLite + sources.json across container restarts
      - ./data:/app/data
      - ./backend/data:/app/backend/data
    environment:
      - PYTHONUNBUFFERED=1
    # Chromium needs sufficient shared memory under Docker
    shm_size: 1gb
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
